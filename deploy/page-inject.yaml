# page_inject 横向移动 demo
# 攻击者容器 + 多个受害者容器，同节点同镜像，共享 libc page cache
# 部署后:
#   1. kubectl exec -n pcce-demo attacker -- /page_inject
#   2. 自动感染同节点所有 ubuntu:22.04 容器
#   3. 在交互 shell 里选择目标容器执行命令

---
# 攻击者 Pod
apiVersion: v1
kind: Pod
metadata:
  name: attacker
  namespace: pcce-demo
  labels:
    app: attacker
    role: attacker
spec:
  containers:
  - name: attacker
    image: ubuntu:22.04
    command: ["/bin/sh", "-c", "while sleep 3600; do :; done"]
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    resources:
      limits:
        memory: "128Mi"
        cpu: "200m"
  restartPolicy: Always

---
# 受害者 Pod 1 - 模拟业务服务
apiVersion: v1
kind: Pod
metadata:
  name: victim-web
  namespace: pcce-demo
  labels:
    app: victim-web
    role: victim
spec:
  containers:
  - name: web
    image: ubuntu:22.04
    command: ["/bin/sh", "-c", "while sleep 3600; do :; done"]
    resources:
      limits:
        memory: "128Mi"
        cpu: "200m"
  restartPolicy: Always

---
# 受害者 Pod 2 - 模拟另一个服务
apiVersion: v1
kind: Pod
metadata:
  name: victim-api
  namespace: pcce-demo
  labels:
    app: victim-api
    role: victim
spec:
  containers:
  - name: api
    image: ubuntu:22.04
    command: ["/bin/sh", "-c", "while sleep 3600; do :; done"]
    resources:
      limits:
        memory: "128Mi"
        cpu: "200m"
  restartPolicy: Always

---
# 受害者 Pod 3 - 模拟数据库
apiVersion: v1
kind: Pod
metadata:
  name: victim-db
  namespace: pcce-demo
  labels:
    app: victim-db
    role: victim
spec:
  containers:
  - name: db
    image: ubuntu:22.04
    command: ["/bin/sh", "-c", "while sleep 3600; do :; done"]
    resources:
      limits:
        memory: "128Mi"
        cpu: "200m"
  restartPolicy: Always
